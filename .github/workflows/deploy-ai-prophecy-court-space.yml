name: Deploy AI Prophecy Court Space

on:
  push:
    branches: [main]
    paths:
      - "projects/ai-prophecy-court/space/**"
      - ".github/workflows/deploy-ai-prophecy-court-space.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-prophecy-court-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: projects/ai-prophecy-court/space/frontend/package-lock.json

      - name: Build custom frontend
        working-directory: projects/ai-prophecy-court/space/frontend
        run: |
          npm ci
          npm run test
          npm run build

      - name: Attach generated Space assets
        run: |
          git config user.name "AI Prophecy Court CI"
          git config user.email "noreply@openai.com"
          git add -f projects/ai-prophecy-court/space/frontend/dist
          git commit -m "build: bundle AI Prophecy Court frontend

          Co-authored-by: Codex <noreply@openai.com>"

      - name: Create Space subtree
        run: git subtree split --prefix=projects/ai-prophecy-court/space --branch hf-space-sync

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::notice::HF_TOKEN is not configured; skipping Hugging Face Space push."
            exit 0
          fi

          git push --force \
            "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/build-small-hackathon/ai-prophecy-court" \
            hf-space-sync:main
