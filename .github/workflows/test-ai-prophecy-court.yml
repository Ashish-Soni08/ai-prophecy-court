name: Test AI Prophecy Court

on:
  pull_request:
    paths:
      - "projects/ai-prophecy-court/**"
      - ".github/workflows/test-ai-prophecy-court.yml"
  push:
    branches: [main]
    paths:
      - "projects/ai-prophecy-court/**"
      - ".github/workflows/test-ai-prophecy-court.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: projects/ai-prophecy-court/space/frontend/package-lock.json

      - name: Test Python
        working-directory: projects/ai-prophecy-court
        run: |
          uv sync --locked --extra dev --extra space --extra runtime
          uv run pytest -q

      - name: Test and build frontend
        working-directory: projects/ai-prophecy-court/space/frontend
        run: |
          npm ci
          npm run test
          npm run build

      - name: Audit submission readiness
        working-directory: projects/ai-prophecy-court
        run: uv run python scripts/audit_submission.py

      - name: Test browser flow and accessibility
        working-directory: projects/ai-prophecy-court/space/frontend
        run: npm run test:e2e
